<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付失败 - 公益捐助平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        main {
            text-align: center;
            padding: 60px 30px;
        }
        .fail-icon {
            font-size: 80px;
            color: #f44336;
            margin-bottom: 30px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            margin: 0 10px;
        }
        .btn:hover {
            background-color: #da190b;
        }
        .btn-secondary {
            background-color: #9e9e9e;
        }
        .btn-secondary:hover {
            background-color: #757575;
        }
    </style>
</head>
<body>
    <header>
        <h1>公益捐助平台</h1>
        <p>为需要帮助的人贡献一份力量</p>
    </header>
    <main>
        <div class="fail-icon">×</div>
        <h2>支付失败</h2>
        <p>很抱歉，支付过程中遇到了问题，请稍后重试。</p>
        <div>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">返回主页</a>
            <a href="javascript:history.back()" class="btn">重新支付</a>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 公益捐助平台</p>
    </footer>
</body>
</html>
